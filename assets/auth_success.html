<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authentication Successful – GTM CLI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #ffffff;
      color: #1f2937;
    }
    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 420px;
    }
    .icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrapper svg {
      width: 40px;
      height: 40px;
      stroke: white;
      stroke-width: 3;
      fill: none;
    }
    .brand {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #2563eb;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.75rem;
    }
    .message {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .hint-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #f3f4f6;
      border-radius: 0.5rem;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
    }
    .hint {
      color: #374151;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.875rem;
    }
    .copy-btn {
      background: #e5e7eb;
      border: none;
      border-radius: 0.375rem;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      transition: background 0.15s, color 0.15s;
    }
    .copy-btn:hover { background: #d1d5db; color: #374151; }
    .copy-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }
    .copy-btn.copied { background: #d1fae5; color: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <div class="brand">GTM CLI</div>
    <h1 id="title">Authentication Successful</h1>
    <p class="message" id="message">You're all set! You can close this window and return to your terminal.</p>
    <div class="hint-wrapper">
      <span class="hint">gtm accounts list</span>
      <button class="copy-btn" id="copyBtn" onclick="copyCommand()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      </button>
    </div>
  </div>
  <script>
    const i18n = {
      en:      { title: "Authentication Successful",  message: "You're all set! You can close this window and return to your terminal." },
      ko:      { title: "인증 완료",                   message: "완료되었습니다! 이 창을 닫고 터미널로 돌아가세요." },
      ja:      { title: "認証完了",                    message: "完了しました！このウィンドウを閉じてターミナルに戻ってください。" },
      zh:      { title: "认证成功",                    message: "一切就绪！您可以关闭此窗口并返回终端。" },
      "zh-TW": { title: "認證成功",                    message: "一切就緒！您可以關閉此視窗並返回終端機。" },
      es:      { title: "Autenticación exitosa",       message: "¡Todo listo! Puedes cerrar esta ventana y volver a la terminal." },
      fr:      { title: "Authentification réussie",    message: "C'est fait ! Vous pouvez fermer cette fenêtre et retourner au terminal." },
      de:      { title: "Authentifizierung erfolgreich", message: "Alles bereit! Sie können dieses Fenster schließen und zum Terminal zurückkehren." },
      pt:      { title: "Autenticação bem-sucedida",   message: "Tudo pronto! Você pode fechar esta janela e voltar ao terminal." },
    };
    const lang = navigator.language || "en";
    const msg = i18n[lang] || i18n[lang.slice(0, 2)] || i18n.en;
    document.getElementById("title").textContent = msg.title;
    document.getElementById("message").textContent = msg.message;

    function copyCommand() {
      navigator.clipboard.writeText("gtm accounts list").then(() => {
        const btn = document.getElementById("copyBtn");
        btn.classList.add("copied");
        btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        }, 2000);
      });
    }
  </script>
</body>
</html>
